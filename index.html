<style>

}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {

<script>
'use strict';

// ============== Frac (rational arithmetic) ==============
function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}

class Frac {
  constructor(n, d = 1) {
    if (d === 0) throw new Error('0 で割れません');
    if (!Number.isFinite(n) || !Number.isFinite(d)) {
      this.n = 0; this.d = 1; return;
    }
    if (!Number.isInteger(n) || !Number.isInteger(d)) {
      const f = Frac.fromNumber(n / d);
      this.n = f.n; this.d = f.d; return;
    }
    if (d < 0) { n = -n; d = -d; }
    const g = gcd(n, d);
    this.n = n / g;
    this.d = d / g;
  }
  static of(n, d = 1) { return new Frac(n, d); }
  static fromNumber(x, maxDen = 64) {
    if (Number.isInteger(x)) return new Frac(x);
    if (!Number.isFinite(x)) return new Frac(0);
    let bestN = Math.round(x), bestD = 1, bestErr = Math.abs(x - Math.round(x));
    for (let d = 2; d <= maxDen; d++) {
      const n = Math.round(x * d);
      const err = Math.abs(x - n / d);
      if (err < bestErr - 1e-15) {
        bestN = n; bestD = d; bestErr = err;
        if (err < 1e-12) break;
      }
    }
    return new Frac(bestN, bestD);
  }
  add(o) { return new Frac(this.n * o.d + o.n * this.d, this.d * o.d); }
  sub(o) { return new Frac(this.n * o.d - o.n * this.d, this.d * o.d); }
  mul(o) { return new Frac(this.n * o.n, this.d * o.d); }
  neg() { return new Frac(-this.n, this.d); }
  abs() { return new Frac(Math.abs(this.n), this.d); }
  pow2() { return this.mul(this); }
  recip() {
    if (this.isZero()) throw new Error('0 の逆数はありません');
    return new Frac(this.d, this.n);
  }
  scale(k) { return new Frac(this.n * k, this.d); }
  isZero() { return this.n === 0; }
  isPos() { return this.n > 0; }
  isNeg() { return this.n < 0; }
  isInt() { return this.d === 1; }
  isOne() { return this.n === 1 && this.d === 1; }
  isNegOne() { return this.n === -1 && this.d === 1; }
  cmp(o) { return Math.sign(this.n * o.d - o.n * this.d); }
  num() { return this.n / this.d; }
}

// ============== Polynomial in x with Frac coefficients ==============
class Poly {
  constructor(coefs) {
    while (coefs.length > 1 && coefs[coefs.length - 1].isZero()) coefs.pop();
    this.coefs = coefs.length ? coefs : [Frac.of(0)];
  }
  static const(c) { return new Poly([c]); }
  static x() { return new Poly([Frac.of(0), Frac.of(1)]); }
  static zero() { return new Poly([Frac.of(0)]); }
  degree() { return this.coefs.length - 1; }
  coef(i) { return i < this.coefs.length ? this.coefs[i] : Frac.of(0); }
  add(p) {
    const n = Math.max(this.coefs.length, p.coefs.length);
    const r = [];
    for (let i = 0; i < n; i++) r.push(this.coef(i).add(p.coef(i)));
    return new Poly(r);
  }
  sub(p) { return this.add(p.neg()); }
  neg() { return new Poly(this.coefs.map(c => c.neg())); }
  mul(p) {
    const len = this.coefs.length + p.coefs.length - 1;
    const r = Array.from({length: len}, () => Frac.of(0));
    for (let i = 0; i < this.coefs.length; i++) {
      for (let j = 0; j < p.coefs.length; j++) {
        r[i+j] = r[i+j].add(this.coefs[i].mul(p.coefs[j]));
      }
    }
    return new Poly(r);
  }
  scale(c) { return new Poly(this.coefs.map(x => x.mul(c))); }
  pow(n) {
    if (n < 0) throw new Error('負の指数は未対応');
    if (n === 0) return Poly.const(Frac.of(1));
    let r = this;
    for (let i = 1; i < n; i++) r = r.mul(this);
    return r;
  }
  isZero() { return this.coefs.every(c => c.isZero()); }
  isConstant() { return this.degree() === 0; }
}

// ============== Tokenizer + Parser ==============
function tokenize(s) {
  s = s.trim()
       .replace(/\s+/g, '')
       .replace(/[−–—ー]/g, '-')
       .replace(/[×・*]/g, '*')
       .replace(/[÷]/g, '/')
       .replace(/²/g, '^2').replace(/³/g, '^3').replace(/⁴/g, '^4')
       .replace(/½/g, '(1/2)').replace(/⅓/g, '(1/3)').replace(/⅔/g, '(2/3)')
       .replace(/¼/g, '(1/4)').replace(/¾/g, '(3/4)');

  const tokens = [];
  let i = 0;
  while (i < s.length) {
    const c = s[i];
    if (/[0-9.]/.test(c)) {
      let j = i;
      while (j < s.length && /[0-9.]/.test(s[j])) j++;
      tokens.push({ type: 'NUM', value: s.slice(i, j) });
      i = j;
    } else if (c === 'x' || c === 'X') {
      tokens.push({ type: 'VAR' }); i++;
    } else if (c === '(') { tokens.push({ type: 'LPAREN' }); i++; }
    else if (c === ')') { tokens.push({ type: 'RPAREN' }); i++; }
    else if ('+-*/^'.includes(c)) { tokens.push({ type: 'OP', value: c }); i++; }
    else throw new Error(`不明な文字: '${c}'`);
  }

  // Implicit multiplication between adjacent atoms
  const out = [];
  for (let k = 0; k < tokens.length; k++) {
    out.push(tokens[k]);
    const cur = tokens[k], nxt = tokens[k+1];
    if (!nxt) continue;
    const atomEnd   = cur.type === 'NUM' || cur.type === 'VAR' || cur.type === 'RPAREN';
    const atomStart = nxt.type === 'NUM' || nxt.type === 'VAR' || nxt.type === 'LPAREN';
    if (atomEnd && atomStart) out.push({ type: 'OP', value: '*' });
  }
  return out;
}

function parse(tokens) {
  let pos = 0;
  const peek = () => tokens[pos];
  const consume = () => tokens[pos++];
  const match = (type, value) => {
    const t = peek();
    if (t && t.type === type && (value === undefined || t.value === value)) { pos++; return t; }
    return null;
  };

  function expr() {
    let left = term();
    while (peek() && peek().type === 'OP' && (peek().value === '+' || peek().value === '-')) {
      const op = consume().value;
      const right = term();
      left = (op === '+') ? left.add(right) : left.sub(right);
    }
    return left;
  }
  function term() {
    let left = unary();
    while (peek() && peek().type === 'OP' && (peek().value === '*' || peek().value === '/')) {
      const op = consume().value;
      const right = unary();
      if (op === '*') left = left.mul(right);
      else {
        if (right.degree() !== 0) throw new Error('変数を含む式での割り算は未対応');
        const c = right.coef(0);
        if (c.isZero()) throw new Error('0 で割れません');
        left = left.scale(c.recip());
      }
    }
    return left;
  }
  function unary() {
    if (match('OP', '-')) return unary().neg();
    if (match('OP', '+')) return unary();
    return power();
  }
  function power() {
    let base = atom();
    if (peek() && peek().type === 'OP' && peek().value === '^') {
      consume();
      const e = unary();
      if (e.degree() !== 0) throw new Error('指数は定数のみ対応');
      const ec = e.coef(0);
      if (!ec.isInt() || ec.isNeg()) throw new Error('指数は非負整数のみ対応');
      base = base.pow(ec.n);
    }
    return base;
  }
  function atom() {
    if (match('LPAREN')) {
      const e = expr();
      if (!match('RPAREN')) throw new Error('閉じ括弧 ) がありません');
      return e;
    }
    const num = match('NUM');
    if (num) {
      const v = parseFloat(num.value);
      if (!Number.isFinite(v)) throw new Error(`数値として読めません: '${num.value}'`);
      return Poly.const(Frac.fromNumber(v));
    }
    if (match('VAR')) return Poly.x();
    if (peek()) throw new Error(`予期しない記号: '${peek().value || peek().type}'`);
    throw new Error('式が途中で終わっています');
  }

  const result = expr();
  if (pos < tokens.length) {
    const t = tokens[pos];
    throw new Error(`余分な記号: '${t.value || t.type}'`);
  }
  return result;
}

function parseInput(s) {
  if (!s || !s.trim()) throw new Error('式が空です');
  const tokens = tokenize(s);
  return parse(tokens);
}

// ============== Factorization ==============
function factorPoly(poly) {
  if (poly.degree() > 2) return { type: 'unsupported', reason: '3次以上は未対応', poly };
  if (poly.isZero()) return { type: 'zero', poly };

  const c0 = poly.coef(0), c1 = poly.coef(1), c2 = poly.coef(2);
  const coefs = [c0, c1, c2];
  let lcm = 1;
  for (const c of coefs) {
    if (!c.isZero()) lcm = lcm * c.d / gcd(lcm, c.d);
  }
  const intCoefs = coefs.map(c => c.n * lcm / c.d);
  let g = 0;
  for (const v of intCoefs) if (v !== 0) g = gcd(g, Math.abs(v));
  if (g === 0) g = 1;
  let sign = 1;
  for (let i = poly.degree(); i >= 0; i--) {
    if (intCoefs[i] !== 0) { sign = intCoefs[i] < 0 ? -1 : 1; break; }
  }
  const commonFrac = new Frac(sign * g, lcm);
  const r0 = sign * intCoefs[0] / g;
  const r1 = sign * intCoefs[1] / g;
  const r2 = sign * intCoefs[2] / g;
  const reducedPoly = new Poly([Frac.of(r0), Frac.of(r1), Frac.of(r2)]);

  const dgr = reducedPoly.degree();
  if (dgr === 0) return { type: 'constant', commonFrac, reducedPoly };
  if (dgr === 1) {
    return { type: 'linear', commonFrac, reducedPoly, m: r1, k: r0 };
  }

  // Quadratic: try diff, square, trinomial
  // 平方の差: (αx)² − β² = (αx+β)(αx−β)
  if (r1 === 0 && r2 > 0 && r0 < 0) {
    const a = Math.sqrt(r2), b = Math.sqrt(-r0);
    if (Number.isInteger(a) && Number.isInteger(b)) {
      return { type: 'diff', commonFrac, reducedPoly, alpha: a, beta: b };
    }
  }
  // 平方完成: (αx + β)² = α²x² + 2αβx + β²
  if (r2 > 0 && r0 > 0) {
    const a = Math.sqrt(r2), b = Math.sqrt(r0);
    if (Number.isInteger(a) && Number.isInteger(b)) {
      if (r1 === 2*a*b) return { type: 'square', commonFrac, reducedPoly, alpha: a, beta: b };
      if (r1 === -2*a*b) return { type: 'square', commonFrac, reducedPoly, alpha: a, beta: -b };
    }
  }
  // 二次三項式 monic
  if (r2 === 1) {
    const D = r1*r1 - 4*r0;
    if (D >= 0) {
      const sd = Math.sqrt(D);
      if (Number.isInteger(sd) && (-r1 + sd) % 2 === 0) {
        const root1 = (-r1 + sd)/2, root2 = (-r1 - sd)/2;
        return { type: 'trinomial', commonFrac, reducedPoly, p: -root1, q: -root2 };
      }
    }
    return { type: 'unfactorable', commonFrac, reducedPoly,
             reason: '有理数の範囲では因数分解できません（判別式が完全平方になりません）' };
  }
  return { type: 'unsupported', commonFrac, reducedPoly,
           reason: '中3 範囲外（共通因数も完全平方も持たない非モニック 2 次式）' };
}

// ============== Display helpers ==============
function fracHtml(f) {
  if (f.isInt()) return `${f.n}`;
  const sign = f.n < 0 ? '−' : '';
  return `${sign}<span class="fr"><span class="fn">${Math.abs(f.n)}</span><span class="fd">${f.d}</span></span>`;
}
function fracText(f) {
  if (f.isInt()) return `${f.n}`;
  return `${f.n}/${f.d}`;
}
function powStr(i) {
  if (i === 0) return '';
  if (i === 1) return 'x';
  if (i === 2) return 'x²';
  return `x^${i}`;
}
// Term in middle of expression with leading sign: " + 3x"
function termStr(coef, varStr) {
  if (coef.isZero()) return '';
  const sign = coef.isPos() ? ' + ' : ' − ';
  const abs = coef.abs();
  const numHtml = (varStr && abs.isOne()) ? '' : fracHtml(abs);
  return sign + numHtml + (varStr || '');
}
function leadStr(coef, varStr) {
  if (coef.isZero()) return '0';
  const sign = coef.isNeg() ? '−' : '';
  const abs = coef.abs();
  const numHtml = (varStr && abs.isOne()) ? '' : fracHtml(abs);
  return sign + numHtml + (varStr || '');
}
function signedConst(coef) {
  return (coef.isNeg() ? '− ' : '+ ') + fracHtml(coef.abs());
}
function prefixStr(coef) {
  if (coef.isOne()) return '';
  if (coef.isNegOne()) return '−';
  return leadStr(coef, '');
}

// Polynomial → HTML (canonical form)
function polyHtml(poly) {
  const terms = [];
  for (let i = poly.degree(); i >= 0; i--) {
    const c = poly.coef(i);
    if (c.isZero() && poly.degree() > 0) continue;
    const v = powStr(i);
    if (terms.length === 0) terms.push(leadStr(c, v));
    else terms.push(termStr(c, v));
  }
  return terms.join('') || '0';
}

// Factored form HTML (depending on result type)
function factoredHtml(result) {
  const cf = result.commonFrac;
  const cfPrefix = (cf && !cf.isOne()) ? prefixStr(cf) : '';
  switch (result.type) {
    case 'linear': {
      // commonFrac * (m x + k); reduced is (m x + k)
      const inner = leadStr(Frac.of(result.m), 'x') + termStr(Frac.of(result.k), '');
      if (cf.isOne()) return inner;
      if (cf.isNegOne()) return `−(${inner})`;
      return `${cfPrefix}(${inner})`;
    }
    case 'trinomial': {
      const p = Frac.of(result.p), q = Frac.of(result.q);
      const a = `(x ${signedConst(p)})`;
      const b = `(x ${signedConst(q)})`;
      // perfect square: p === q  → (x + p)²
      if (result.p === result.q) {
        return `${cfPrefix}(x ${signedConst(p)})²`;
      }
      return `${cfPrefix}${a}${b}`;
    }
    case 'diff': {
      const a = result.alpha, b = result.beta;
      const ax = a === 1 ? 'x' : `${a}x`;
      return `${cfPrefix}(${ax} + ${b})(${ax} − ${b})`;
    }
    case 'square': {
      const a = result.alpha, b = result.beta;
      const ax = a === 1 ? 'x' : `${a}x`;
      const sign = b >= 0 ? '+' : '−';
      return `${cfPrefix}(${ax} ${sign} ${Math.abs(b)})²`;
    }
    case 'unfactorable':
    case 'unsupported':
      return null;
    case 'constant':
      return polyHtml(result.reducedPoly.scale(result.commonFrac));
    case 'zero': return '0';
  }
  return null;
}

// Common-factored intermediate form HTML, e.g. "2(x²−4)"
function commonFactoredHtml(result) {
  const cf = result.commonFrac;
  if (!cf || cf.isOne()) return null;
  const inner = polyHtml(result.reducedPoly);
  if (cf.isNegOne()) return `−(${inner})`;
  return `${prefixStr(cf)}(${inner})`;
}

// ============== SVG helpers ==============
const SVG_NS = 'http://www.w3.org/2000/svg';
const $ = (id) => document.getElementById(id);
const svgDiag = $('diagram');

function svgEl(tag, attrs = {}, parent = svgDiag) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  parent.appendChild(el);
  return el;
}
function svgText(x, y, text, opts = {}) {
  const t = svgEl('text', {
    x, y,
    'text-anchor': opts.anchor || 'middle',
    'font-size': opts.size || 14,
    'font-weight': opts.weight || 'normal',
    fill: opts.fill || '#1f2937',
    'font-family': opts.family || '"Hiragino Mincho ProN", "Yu Mincho", serif'
  });
  t.textContent = text;
  return t;
}
function clearSvg() {
  const kids = Array.from(svgDiag.children);
  for (const c of kids) if (c.tagName.toLowerCase() !== 'defs') svgDiag.removeChild(c);
}
const C = {
  pos: '#bfdbfe', posS: '#2563eb',
  neg: '#fecaca', negS: '#dc2626',
  xsq: '#c7d2fe', xsqS: '#4338ca',
  bsq: '#fde68a', bsqS: '#b45309',
  abPos: '#dbeafe', abPosS: '#3b82f6',
  cut:  '#f3f4f6', cutS:  '#9ca3af',
  innerStroke: '#1e40af',
  textDark: '#1f2937'
};
const HATCH_CSS = 'background-image:repeating-linear-gradient(45deg,#fecaca 0 5px,#dc2626 5px 6.5px);';
function fillStrokeBySign(sign) {
  return sign >= 0
    ? { fill: C.pos, stroke: C.posS }
    : { fill: 'url(#hatchNeg)', stroke: C.negS };
}

// ============== Drawing per type ==============

// 共通因数（線形）: commonFrac · (m x + k) → height a, widths px and qu
function drawCommon(result) {
  clearSvg();
  const a = result.commonFrac;
  const mF = Frac.of(result.m), kF = Frac.of(result.k);
  const aN = a.abs().num(), pN = mF.abs().num(), qN = kF.abs().num();
  if (aN === 0 || (pN === 0 && qN === 0)) return;

  const xL_b = 88, u_b = 22;
  const aH_b = aN * u_b;
  const pW_b = pN * xL_b;
  const qW_b = qN * u_b;
  const W_b = pW_b + qW_b;
  const sc = Math.min(1, 400 / W_b, 220 / aH_b);
  const aH = aH_b * sc, pW = pW_b * sc, qW = qW_b * sc;
  const W = pW + qW;
  const x0 = (480 - W) / 2, y0 = (360 - aH) / 2;

  const apx = a.mul(mF), aq = a.mul(kF);

  if (pN > 0) {
    const c1 = fillStrokeBySign(apx.isNeg() ? -1 : 1);
    svgEl('rect', { x: x0, y: y0, width: pW, height: aH,
      fill: c1.fill, stroke: c1.stroke, 'stroke-width': 2 });
    svgText(x0 + pW/2, y0 + aH/2 + 7, leadStrText(apx, 'x'),
      { size: 22, weight: 'bold', fill: C.textDark });
  }
  if (qN > 0) {
    const c2 = fillStrokeBySign(aq.isNeg() ? -1 : 1);
    svgEl('rect', { x: x0 + pW, y: y0, width: qW, height: aH,
      fill: c2.fill, stroke: c2.stroke, 'stroke-width': 2 });
    svgText(x0 + pW + qW/2, y0 + aH/2 + 7, leadStrText(aq, ''),
      { size: 20, weight: 'bold', fill: C.textDark });
  }

  if (pN > 0) svgText(x0 + pW/2, y0 - 12, leadStrText(mF, 'x'),
    { size: 16, fill: C.textDark, weight: 'bold' });
  if (qN > 0) svgText(x0 + pW + qW/2, y0 - 12, fracText(kF),
    { size: 16, fill: C.textDark, weight: 'bold' });
  svgText(x0 - 22, y0 + aH/2 + 6, fracText(a),
    { size: 18, weight: 'bold', fill: C.textDark });
  svgText(x0 + W/2, y0 + aH + 32,
    leadStrText(mF, 'x') + termStrText(kF, ''),
    { size: 18, weight: 'bold', fill: '#374151' });
  svgEl('path', {
    d: `M ${x0} ${y0+aH+8} L ${x0} ${y0+aH+14} L ${x0+W} ${y0+aH+14} L ${x0+W} ${y0+aH+8}`,
    fill: 'none', stroke: '#9ca3af', 'stroke-width': 1.5
  });
}

// SVG-text version of leadStr / termStr (no HTML, slash form)
function leadStrText(coef, varStr) {
  if (coef.isZero()) return '0';
  const sign = coef.isNeg() ? '−' : '';
  const abs = coef.abs();
  const numTxt = (varStr && abs.isOne()) ? '' : fracText(abs);
  return sign + numTxt + (varStr || '');
}
function termStrText(coef, varStr) {
  if (coef.isZero()) return '';
  const sign = coef.isPos() ? ' + ' : ' − ';
  const abs = coef.abs();
  const numTxt = (varStr && abs.isOne()) ? '' : fracText(abs);
  return sign + numTxt + (varStr || '');
}

// 二次三項式: (x+p)(x+q) — algebra-tile style
function drawTrinomial(result) {
  clearSvg();
  const p = Frac.of(result.p), q = Frac.of(result.q);
  const pN = p.abs().num(), qN = q.abs().num();

  const xL_b = 100, u_b = 22;
  const W_b = xL_b + qN * u_b, H_b = xL_b + pN * u_b;
  const sc = Math.min(1, 360 / W_b, 320 / H_b);
  const xL = xL_b * sc, u = u_b * sc;
  const W = xL + qN * u, H = xL + pN * u;
  const x0 = (480 - W) / 2, y0 = (360 - H) / 2 + 6;

  // x²
  svgEl('rect', { x: x0, y: y0, width: xL, height: xL,
    fill: C.xsq, stroke: C.xsqS, 'stroke-width': 2 });
  svgText(x0 + xL/2, y0 + xL/2 + 10, 'x²',
    { size: Math.max(16, xL * 0.3), weight: 'bold', fill: C.xsqS });

  // q·x (top-right)
  if (qN > 0) {
    const cQ = fillStrokeBySign(q.isNeg() ? -1 : 1);
    svgEl('rect', { x: x0 + xL, y: y0, width: qN*u, height: xL,
      fill: cQ.fill, stroke: cQ.stroke, 'stroke-width': 2 });
    svgText(x0 + xL + qN*u/2, y0 + xL/2 + 7,
      leadStrText(q, 'x'), { size: 16, weight: 'bold' });
  }
  // p·x (bottom-left)
  if (pN > 0) {
    const cP = fillStrokeBySign(p.isNeg() ? -1 : 1);
    svgEl('rect', { x: x0, y: y0 + xL, width: xL, height: pN*u,
      fill: cP.fill, stroke: cP.stroke, 'stroke-width': 2 });
    svgText(x0 + xL/2, y0 + xL + pN*u/2 + 5,
      leadStrText(p, 'x'), { size: 16, weight: 'bold' });
  }
  // p·q (bottom-right)
  if (pN > 0 && qN > 0) {
    const pq = p.mul(q);
    const cPQ = fillStrokeBySign(pq.isNeg() ? -1 : 1);
    svgEl('rect', { x: x0 + xL, y: y0 + xL, width: qN*u, height: pN*u,
      fill: cPQ.fill, stroke: cPQ.stroke, 'stroke-width': 2 });
    svgText(x0 + xL + qN*u/2, y0 + xL + pN*u/2 + 5,
      fracText(pq), { size: 14, weight: 'bold' });
  }

  // Top label: x + q
  svgText(x0 + W/2, y0 - 12,
    `x ${q.isNeg() ? '−' : '+'} ${fracText(q.abs())}`,
    { size: 16, weight: 'bold', fill: '#374151' });
  // Left label rotated: x + p
  const lx = x0 - 14, ly = y0 + H/2;
  const lbl = svgText(lx, ly, `x ${p.isNeg() ? '−' : '+'} ${fracText(p.abs())}`,
    { size: 16, weight: 'bold', fill: '#374151' });
  lbl.setAttribute('transform', `rotate(-90 ${lx} ${ly})`);
}

// 平方の差: (αx)² − β² = (αx+β)(αx−β) — L-shape rearrangement
function drawDiff(result) {
  clearSvg();
  const a = result.alpha, b = result.beta;  // both positive integers

  // Visual scale: x has fixed length xL (so αx = αxL); β uses small unit
  const xL_b = 90, u_b = 18;
  const aSize_b = a * xL_b;
  const bSize_b = b * u_b;
  const w2_b = a * xL_b + b * u_b;
  const h2_b = a * xL_b - b * u_b;
  const arrowGap = 60;
  const totalW_b = aSize_b + arrowGap + w2_b;
  const sc = Math.min(1, 460 / totalW_b, 270 / aSize_b);
  const xL = xL_b * sc, u = u_b * sc;
  const aSize = a * xL, bSize = b * u;
  const w2 = a*xL + b*u, h2 = a*xL - b*u;
  const arrowG = arrowGap * sc;
  const totalW = aSize + arrowG + w2;

  let x1 = (480 - totalW) / 2;
  if (x1 < 24) x1 = 24;
  const y1 = (360 - aSize) / 2;

  // Left strip: (αx − β) wide × αx high
  svgEl('rect', { x: x1, y: y1, width: aSize - bSize, height: aSize,
    fill: C.pos, stroke: C.posS, 'stroke-width': 2 });
  // Bottom-right strip: β wide × (αx − β) high
  svgEl('rect', { x: x1 + (aSize - bSize), y: y1 + bSize, width: bSize, height: aSize - bSize,
    fill: C.pos, stroke: C.posS, 'stroke-width': 2 });
  // Cut-out β² square
  svgEl('rect', { x: x1 + (aSize - bSize), y: y1, width: bSize, height: bSize,
    fill: C.cut, stroke: C.cutS, 'stroke-width': 2, 'stroke-dasharray': '5 4' });
  svgText(x1 + (aSize - bSize) + bSize/2, y1 + bSize/2 + 5,
    `${b}²`, { size: 13, fill: C.cutS, weight: 'bold' });
  // Outer dashed border
  svgEl('rect', { x: x1, y: y1, width: aSize, height: aSize,
    fill: 'none', stroke: '#9ca3af', 'stroke-width': 1, 'stroke-dasharray': '2 3' });
  // Labels
  const axLabel = a === 1 ? 'x' : `${a}x`;
  svgText(x1 + aSize/2, y1 - 8, axLabel, { size: 14, weight: 'bold' });
  svgText(x1 - 12, y1 + aSize/2 + 5, axLabel, { size: 14, weight: 'bold' });

  // Arrow
  const arrowX = x1 + aSize + arrowG/2;
  svgText(arrowX, 184, '→', { size: 36, fill: C.posS, weight: 'bold' });

  // Right rectangle: (αx+β) × (αx−β)
  const x2 = x1 + aSize + arrowG;
  const y2 = (360 - h2) / 2;
  svgEl('rect', { x: x2, y: y2, width: w2, height: h2,
    fill: C.pos, stroke: C.posS, 'stroke-width': 2 });
  svgText(x2 + w2/2, y2 + h2/2 + 6,
    `(${axLabel})² − ${b}²`, { size: 13, weight: 'bold' });
  svgText(x2 + w2/2, y2 - 8,
    `${axLabel} + ${b}`, { size: 13, weight: 'bold', fill: '#374151' });
  svgText(x2 + w2 + 8, y2 + h2/2 + 5,
    `${axLabel} − ${b}`, { size: 13, weight: 'bold', anchor: 'start', fill: '#374151' });
}

// 平方完成: (αx + β)² — β > 0: 4-piece square; β < 0: subtract-and-add
function drawSquare(result) {
  clearSvg();
  const a = result.alpha;
  const b = result.beta;
  const absB = Math.abs(b);

  // x is the variable — base length xL; αx = α·xL; β uses smaller unit
  const xL_b = 90, u_b = 26;
  const axSize_b = a * xL_b;
  const bSize_b = absB * u_b;

  if (b >= 0) {
    // (αx + β)² square
    const total_b = axSize_b + bSize_b;
    const sc = Math.min(1, 320 / total_b);
    const xL = xL_b * sc, u = u_b * sc;
    const axSize = a * xL, bSize = absB * u;
    const total = axSize + bSize;
    const x0 = (480 - total) / 2, y0 = (360 - total) / 2;

    // (αx)²
    svgEl('rect', { x: x0, y: y0, width: axSize, height: axSize,
      fill: C.pos, stroke: C.posS, 'stroke-width': 2 });
    svgText(x0 + axSize/2, y0 + axSize/2 + 8,
      a === 1 ? `x²` : `(${a}x)² = ${a*a}x²`, { size: 14, weight: 'bold' });
    // αx·β top-right
    svgEl('rect', { x: x0 + axSize, y: y0, width: bSize, height: axSize,
      fill: C.abPos, stroke: C.abPosS, 'stroke-width': 2 });
    svgText(x0 + axSize + bSize/2, y0 + axSize/2 + 6,
      a === 1 ? `${b}x` : `${a*b}x`, { size: 13, weight: 'bold' });
    // αx·β bottom-left
    svgEl('rect', { x: x0, y: y0 + axSize, width: axSize, height: bSize,
      fill: C.abPos, stroke: C.abPosS, 'stroke-width': 2 });
    svgText(x0 + axSize/2, y0 + axSize + bSize/2 + 6,
      a === 1 ? `${b}x` : `${a*b}x`, { size: 13, weight: 'bold' });
    // β²
    svgEl('rect', { x: x0 + axSize, y: y0 + axSize, width: bSize, height: bSize,
      fill: C.bsq, stroke: C.bsqS, 'stroke-width': 2 });
    svgText(x0 + axSize + bSize/2, y0 + axSize + bSize/2 + 6,
      `${b*b}`, { size: 13, weight: 'bold' });

    const sideLabel = (a === 1 ? 'x' : `${a}x`) + ` + ${b}`;
    svgText(x0 + total/2, y0 - 10, sideLabel,
      { size: 14, weight: 'bold', fill: '#374151' });
  } else {
    // (αx − |β|)² : start from (αx)² square, subtract two αx·|β| strips, add back |β|²
    const sc = Math.min(1, 280 / axSize_b);
    const xL = xL_b * sc, u = u_b * sc;
    const axSize = a * xL, bSize = absB * u;
    const x0 = (480 - axSize) / 2, y0 = (360 - axSize) / 2;

    svgEl('rect', { x: x0, y: y0, width: axSize, height: axSize,
      fill: C.pos, stroke: C.posS, 'stroke-width': 2 });
    svgText(x0 + axSize/2, y0 + axSize*0.18,
      a === 1 ? `x² = ${a*a}` : `(${a}x)²`,
      { size: 14, weight: 'bold', fill: C.posS });

    if (bSize <= axSize) {
      // Right strip
      svgEl('rect', { x: x0 + axSize - bSize, y: y0,
        width: bSize, height: axSize,
        fill: 'url(#hatchNeg)', stroke: C.negS, 'stroke-width': 2 });
      svgText(x0 + axSize - bSize/2, y0 + axSize/2 + 6,
        `−${a*absB}x`, { size: 13, weight: 'bold', fill: '#7f1d1d' });
      // Bottom strip
      svgEl('rect', { x: x0, y: y0 + axSize - bSize,
        width: axSize, height: bSize,
        fill: 'url(#hatchNeg)', stroke: C.negS, 'stroke-width': 2 });
      svgText(x0 + axSize*0.3, y0 + axSize - bSize/2 + 6,
        `−${a*absB}x`, { size: 13, weight: 'bold', fill: '#7f1d1d' });
      // β² added back
      svgEl('rect', { x: x0 + axSize - bSize, y: y0 + axSize - bSize,
        width: bSize, height: bSize,
        fill: C.bsq, stroke: C.bsqS, 'stroke-width': 2 });
      svgText(x0 + axSize - bSize/2, y0 + axSize - bSize/2 + 6,
        `+${absB*absB}`, { size: 13, weight: 'bold', fill: '#92400e' });
      // Inner (αx − |β|)² outline
      const inner = axSize - bSize;
      if (inner > 0) {
        svgEl('rect', { x: x0, y: y0, width: inner, height: inner,
          fill: 'none', stroke: C.innerStroke, 'stroke-width': 3, 'stroke-dasharray': '6 4' });
        const innerLabel = (a === 1 ? 'x' : `${a}x`) + ` − ${absB}`;
        svgText(x0 + inner/2, y0 + inner/2 + 6,
          `(${innerLabel})²`, { size: 12, weight: 'bold', fill: '#1e3a8a' });
      }
    }
    svgText(x0 + axSize/2, y0 - 10,
      a === 1 ? `x = ${a}（変数）` : `${a}x`,
      { size: 14, weight: 'bold', fill: '#374151' });
  }
}

// ============== Legend per type ==============
function legendFor(result) {
  switch (result.type) {
    case 'linear':
      return `
        <span><span class="swatch" style="background:${C.pos};border-color:${C.posS}"></span>正の項（加える）</span>
        <span><span class="swatch" style="${HATCH_CSS}border-color:${C.negS}"></span>負の項（引く）</span>
      `;
    case 'trinomial':
      return `
        <span><span class="swatch" style="background:${C.xsq};border-color:${C.xsqS}"></span>x²</span>
        <span><span class="swatch" style="background:${C.pos};border-color:${C.posS}"></span>正の項（加える）</span>
        <span><span class="swatch" style="${HATCH_CSS}border-color:${C.negS}"></span>負の項（引く）</span>
      `;
    case 'diff':
      return `
        <span><span class="swatch" style="background:${C.pos};border-color:${C.posS}"></span>残る面積</span>
        <span><span class="swatch" style="background:${C.cut};border-color:${C.cutS}"></span>切り取った β² 部分</span>
      `;
    case 'square':
      if (result.beta < 0) return `
        <span><span class="swatch" style="background:${C.pos};border-color:${C.posS}"></span>(αx)²（加える）</span>
        <span><span class="swatch" style="${HATCH_CSS}border-color:${C.negS}"></span>引く帯（−αxβ × 2）</span>
        <span><span class="swatch" style="background:${C.bsq};border-color:${C.bsqS}"></span>足し戻す β²</span>
        <span><span class="swatch" style="background:#fff;border:2px dashed ${C.innerStroke}"></span>結果：(αx−|β|)²</span>
      `;
      return `
        <span><span class="swatch" style="background:${C.pos};border-color:${C.posS}"></span>(αx)²</span>
        <span><span class="swatch" style="background:${C.abPos};border-color:${C.abPosS}"></span>αxβ（2つ）</span>
        <span><span class="swatch" style="background:${C.bsq};border-color:${C.bsqS}"></span>β²</span>
      `;
    default: return '';
  }
}

// ============== Explanation per type ==============
function explanationFor(result) {
  const cf = result.commonFrac;
  const cfNote = (cf && !cf.isOne() && !cf.isNegOne())
    ? `<p>共通因数 <b>${fracHtml(cf)}</b> を先に外に出している（残った式に注目）。</p>`
    : (cf && cf.isNegOne() ? `<p>マイナス符号 <b>−</b> を全体から外に出している。</p>` : '');

  switch (result.type) {
    case 'linear': {
      if (cf.isOne() || cf.isNegOne()) {
        return `<h3>これ以上は因数分解できない</h3>
          <p>${result.m}x ${termStr(Frac.of(result.k), '')} は、係数 ${result.m} と定数 ${result.k} に整数の共通因数がないため、これ以上分解できない。</p>`;
      }
      return `<h3>共通因数 ${fracHtml(cf)} でくくり出す</h3>
        ${cfNote}
        <p>もとの式は、縦 <b>${fracHtml(cf)}</b>、横 <b>${result.m}x ${termStr(Frac.of(result.k), '')}</b> の長方形の面積として見られる。</p>
        <p class="note">面積モデルでの負の項は <b style="color:#dc2626">赤＋斜線</b>（引かれる面積）で表す。</p>`;
    }
    case 'trinomial': {
      const p = result.p, q = result.q;
      return `<h3>x² + (p+q)x + pq の因数分解</h3>
        ${cfNote}
        <p>定数項 <b>${p*q}</b> を 2 数の積に分け、その和が x の係数 <b>${p+q}</b> になる組合せを探す → <b>p = ${p}, q = ${q}</b>。</p>
        <p>面積図では、縦 <b>x ${signedConst(Frac.of(p))}</b>、横 <b>x ${signedConst(Frac.of(q))}</b> の長方形を 4 つに分けると、x²、${p}x、${q}x、${p*q} になる。</p>
        ${(p === q) ? '<p class="note">p = q なので、これは <b>(x ' + signedConst(Frac.of(p)) + ')²</b> の <b>平方完成形</b>。</p>' : ''}
        ${(p === -q) ? '<p class="note">q = −p なので、これは <b>x² − ' + (p*p) + '</b> の <b>平方の差</b>。</p>' : ''}
        <p class="note">負の項は <b style="color:#dc2626">赤＋斜線</b>（式の値として全体から引かれる項）として表示。</p>`;
    }
    case 'diff': {
      const a = result.alpha, b = result.beta;
      const ax = a === 1 ? 'x' : `${a}x`;
      return `<h3>平方の差 (αx)² − β² = (αx+β)(αx−β)</h3>
        ${cfNote}
        <p>α = <b>${a}</b>、β = <b>${b}</b>。1辺 <b>${ax}</b> の正方形（面積 <b>${a*a}x²</b>）から、1辺 <b>${b}</b> の正方形（面積 <b>${b*b}</b>）を切り取った L 字の面積は <b>${a*a}x² − ${b*b}</b>。</p>
        <p>L 字を切って並べ替えると、縦 <b>${ax} − ${b}</b>、横 <b>${ax} + ${b}</b> の長方形になる。</p>
        <p>つまり <b>(αx)² − β² = (αx + β)(αx − β)</b>。</p>`;
    }
    case 'square': {
      const a = result.alpha, b = result.beta;
      const absB = Math.abs(b);
      const ax = a === 1 ? 'x' : `${a}x`;
      if (b > 0) {
        return `<h3>(αx + β)² の面積モデル</h3>
          ${cfNote}
          <p>α = <b>${a}</b>、β = <b>${b}</b>。1辺 <b>${ax} + ${b}</b> の正方形を 4 つに分ける：</p>
          <ul>
            <li>左上：<b>(αx)² = ${a*a}x²</b></li>
            <li>右上・左下：<b>αx·β = ${a*b}x</b>（2 つ）</li>
            <li>右下：<b>β² = ${b*b}</b></li>
          </ul>
          <p>合計：<b>${a*a}x² + ${2*a*b}x + ${b*b} = (${ax} + ${b})²</b></p>`;
      } else {
        return `<h3>(αx − |β|)² の面積モデル</h3>
          ${cfNote}
          <p>α = <b>${a}</b>、β = <b>${b}</b>（負）。1辺 <b>${ax}</b> の正方形から、幅 <b>${absB}</b> の帯を縦・横の両方から<b>引き取る</b>（赤＋斜線）。</p>
          <p>右下の小さな正方形 <b>${absB*absB}</b> は「2回引かれてしまう」ので、足し戻す（黄）。</p>
          <p>結果：<b>${a*a}x² − ${2*a*absB}x + ${absB*absB} = (${ax} − ${absB})²</b>（点線で示した内側の正方形）。</p>`;
      }
    }
    case 'unfactorable':
      return `<h3>有理数の範囲では因数分解できない</h3>
        <p>${result.reason}</p>
        <p class="note">中学範囲では因数分解できないが、高校で学ぶ <b>2 次方程式の解の公式</b> で実数解は求められる。</p>`;
    case 'unsupported':
      return `<h3>このアプリの守備範囲外</h3>
        <p>${result.reason || ''}</p>`;
    case 'zero':
      return `<h3>恒等的に 0</h3>
        <p>式は 0 と等しい。</p>`;
    case 'constant':
      return `<h3>定数式</h3>
        <p>x を含まない定数。</p>`;
    default: return '';
  }
}

// ============== Main render flow ==============
function renderError(msg) {
  const f = $('formulaCard');
  f.classList.add('error');
  f.innerHTML = `式が読めません：${msg}`;
  clearSvg();
  $('legend').innerHTML = '';
  $('explanation').innerHTML = `<h3>入力のヒント</h3>
    <p>例：<code>x²+5x+6</code>、<code>x^2-9</code>、<code>(x+2)²-9</code>、<code>2x²-8</code>、<code>(1/2)x²+x+1/2</code></p>
    <ul>
      <li>掛け算は省略可（<code>5x</code>、<code>2(x+1)</code>）</li>
      <li>累乗は <code>²</code> または <code>^2</code></li>
      <li>分数は <code>1/2</code> のようにスラッシュ</li>
    </ul>`;
}

function renderResult(input, poly, result) {
  const f = $('formulaCard');
  f.classList.remove('error');

  // Build display chain
  const inputClean = input.trim();
  const expandedHtml = polyHtml(poly);
  const commonHtml = commonFactoredHtml(result);
  const factored = factoredHtml(result);

  const inputLooksCanonical = !/[()^]/.test(inputClean) && !/²/.test(inputClean);

  const parts = [];
  parts.push(`<span class="step input">${escapeHtmlInput(inputClean)}</span>`);
  if (!inputLooksCanonical) parts.push(`<span class="step expanded">${expandedHtml}</span>`);
  if (commonHtml) parts.push(`<span class="step common">${commonHtml}</span>`);
  if (factored !== null) {
    parts.push(`<span class="step final">${factored}</span>`);
  }

  if (factored === null) {
    // Unfactorable / unsupported: show formula as input = expanded only
    f.innerHTML = parts.join('<span class="eq">=</span>');
  } else {
    f.innerHTML = parts.join('<span class="eq">=</span>');
  }

  // Diagram
  switch (result.type) {
    case 'linear': drawCommon(result); break;
    case 'trinomial': drawTrinomial(result); break;
    case 'diff': drawDiff(result); break;
    case 'square': drawSquare(result); break;
    default: clearSvg(); break;
  }
  $('legend').innerHTML = legendFor(result);
  $('explanation').innerHTML = explanationFor(result);
}

function escapeHtmlInput(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function render() {
  const input = $('exprInput').value;
  if (!input.trim()) {
    $('formulaCard').classList.remove('error');
    $('formulaCard').innerHTML = '<span style="color:var(--muted);font-family:inherit;font-size:16px">式を入力してください</span>';
    clearSvg();
    $('legend').innerHTML = '';
    $('explanation').innerHTML = '';
    return;
  }
  let poly;
  try { poly = parseInput(input); }
  catch (e) { renderError(e.message); return; }
  const result = factorPoly(poly);
  renderResult(input, poly, result);
}

// ============== Event wiring ==============
$('exprInput').addEventListener('input', render);
$('examples').addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  $('exprInput').value = b.textContent;
  render();
  $('exprInput').focus();
});

render();
</script>
</body>
</html>
